<!DOCTYPE html>
<html>
<head>
    <title>Image Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        img { max-width: 150px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🖼️ Image Loading Test</h1>
    
    <div class="test">
        <h2>Test 1: Direct localhost:5000 URL</h2>
        <img src="http://localhost:5000/images/laskar-pelangi.svg" alt="Test 1" onerror="this.parentElement.appendChild(document.createTextNode('❌ FAILED'))">
        <p id="test1">Loading...</p>
    </div>
    
    <div class="test">
        <h2>Test 2: Relative /images path (for Vite proxy)</h2>
        <img src="/images/laskar-pelangi.svg" alt="Test 2" onerror="this.parentElement.appendChild(document.createTextNode('❌ FAILED'))">
        <p id="test2">Loading...</p>
    </div>
    
    <div class="test">
        <h2>Test 3: Fetch to /images endpoint</h2>
        <div id="test3">Loading...</div>
    </div>

    <script>
        // Test API endpoint
        fetch('/images/bumi.svg')
            .then(r => {
                document.getElementById('test3').innerHTML = r.ok ? '✅ SUCCESS: /images/bumi.svg' : '❌ FAILED: ' + r.status;
            })
            .catch(e => {
                document.getElementById('test3').innerHTML = '❌ ERROR: ' + e.message;
            });
    </script>
</body>
</html>
