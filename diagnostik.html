<!DOCTYPE html>
<html>
<head>
    <title>Diagnostik API & Gambar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #333;
        }
        .status-ok {
            color: #27ae60;
            font-weight: bold;
        }
        .status-error {
            color: #e74c3c;
            font-weight: bold;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .book-item {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }
        .book-image {
            width: 100%;
            height: 180px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .book-info {
            padding: 10px;
            font-size: 12px;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .log {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnostik Toko Buku</h1>
        
        <div class="section">
            <h2>1️⃣ Test API Data</h2>
            <div id="api-test" class="loading">Loading API...</div>
        </div>

        <div class="section">
            <h2>2️⃣ Test Gambar dari API</h2>
            <div id="image-test" class="loading">Loading images...</div>
        </div>

        <div class="section">
            <h2>3️⃣ Konsol Log</h2>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        const log = (message) => {
            console.log(message);
            const logsDiv = document.getElementById('logs');
            const p = document.createElement('div');
            p.className = 'log';
            p.textContent = message;
            logsDiv.appendChild(p);
        };

        (async () => {
            try {
                log('🚀 Mulai testing...');
                
                // Test 1: API Data
                log('📡 Fetch /api/books...');
                const response = await fetch('/api/books');
                log(`Status: ${response.status}`);
                
                if (!response.ok) {
                    log(`❌ API Error: ${response.statusText}`);
                    document.getElementById('api-test').innerHTML = `<span class="status-error">❌ API Error ${response.status}</span>`;
                    return;
                }
                
                const data = await response.json();
                log(`✅ API Response OK`);
                log(`Data structure: ${JSON.stringify(data)}`);
                
                let books = data.data || data;
                if (!Array.isArray(books)) {
                    log(`⚠️ Data bukan array: ${typeof books}`);
                    books = [];
                } else {
                    log(`✅ Found ${books.length} books`);
                }
                
                // Display API test result
                let html = `<span class="status-ok">✅ API Working - ${books.length} books loaded</span>`;
                document.getElementById('api-test').innerHTML = html;
                
                // Test 2: Display Images
                if (books.length > 0) {
                    log(`📸 Testing first 6 books images...`);
                    let imageHtml = '<div class="book-grid">';
                    
                    for (let i = 0; i < Math.min(6, books.length); i++) {
                        const book = books[i];
                        const imagePath = book.image ? `/images/${book.image}` : '📖';
                        
                        imageHtml += `
                            <div class="book-item">
                                <div class="book-image">
                                    ${book.image ? `<img src="${imagePath}" alt="${book.title}" onerror="console.warn('Image failed: ${book.image}')">` : '📖'}
                                </div>
                                <div class="book-info">
                                    <strong>${book.title}</strong><br>
                                    ${book.image || 'no image'}
                                </div>
                            </div>
                        `;
                        log(`📚 Book ${i+1}: ${book.title} (image: ${book.image || 'null'})`);
                    }
                    
                    imageHtml += '</div>';
                    document.getElementById('image-test').innerHTML = imageHtml;
                } else {
                    log(`⚠️ No books to display`);
                    document.getElementById('image-test').innerHTML = '<span class="status-error">No books available</span>';
                }
                
                log('✅ Diagnostik selesai!');
                
            } catch (error) {
                log(`❌ Exception: ${error.message}`);
                log(`Stack: ${error.stack}`);
                document.getElementById('api-test').innerHTML = `<span class="status-error">❌ ${error.message}</span>`;
            }
        })();
    </script>
</body>
</html>
