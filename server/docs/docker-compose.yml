version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tokobuku_postgres
    environment:
      POSTGRES_USER: tokobuku_user
      POSTGRES_PASSWORD: tokobuku_password
      POSTGRES_DB: tokobuku_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tokobuku_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokobuku_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tokobuku_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tokobuku.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tokobuku_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  tokobuku_network:
    driver: bridge
