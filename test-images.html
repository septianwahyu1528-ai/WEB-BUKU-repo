<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Loading</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
            background: #f0f0f0;
        }
        .card h3 {
            margin: 10px 0 5px;
            color: #333;
        }
        .card p {
            margin: 5px 0;
            color: #666;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error { color: red; font-weight: bold; }
        .success { color: green; }
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>🖼️ Test Image Loading</h1>
    
    <div class="test-section">
        <h2>API Test Results:</h2>
        <div id="api-test">Loading...</div>
    </div>

    <h2>Books with Images:</h2>
    <div class="container" id="books-container">
        <div class="loading">Loading books...</div>
    </div>

    <script>
        async function loadBooks() {
            try {
                console.log('Fetching books from /api/books...');
                
                // Test API endpoint
                const response = await fetch('/api/books');
                const text = await response.text();
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                console.log('Response text (first 200 chars):', text.substring(0, 200));
                
                // Show API test results
                const apiTest = document.getElementById('api-test');
                if (response.status === 200) {
                    try {
                        const data = JSON.parse(text);
                        apiTest.innerHTML = `<span class="success">✓ API Response Valid</span><br>
                            Status: ${response.status}<br>
                            Books count: ${data.data ? data.data.length : (Array.isArray(data) ? data.length : 'unknown')}`;
                    } catch (e) {
                        apiTest.innerHTML = `<span class="error">✗ Invalid JSON Response</span><br>
                            Got HTML instead of JSON. Content: ${text.substring(0, 100)}...`;
                        return;
                    }
                } else {
                    apiTest.innerHTML = `<span class="error">✗ API Error: Status ${response.status}</span>`;
                    return;
                }
                
                // Parse data
                const data = JSON.parse(text);
                const books = data.data || (Array.isArray(data) ? data : []);
                
                console.log('Books:', books);
                
                if (books.length === 0) {
                    document.getElementById('books-container').innerHTML = '<p>No books found</p>';
                    return;
                }

                // Render books
                let html = '';
                books.forEach(book => {
                    const imageUrl = book.image ? `/images/${book.image}` : '/placeholder.svg';
                    html += `
                        <div class="card">
                            <img src="${imageUrl}" alt="${book.title}" onerror="this.src='/data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2224%22 fill=%22%23999%22%3E📖%3C/text%3E%3C/svg%3E'">
                            <h3>${book.title}</h3>
                            <p><strong>Author:</strong> ${book.author}</p>
                            <p><strong>Image:</strong> ${book.image}</p>
                            <p><strong>Price:</strong> Rp ${parseInt(book.price).toLocaleString('id-ID')}</p>
                        </div>
                    `;
                });
                document.getElementById('books-container').innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('api-test').innerHTML = `<span class="error">✗ Error: ${error.message}</span>`;
                document.getElementById('books-container').innerHTML = `<p class="error">Error loading books: ${error.message}</p>`;
            }
        }

        loadBooks();
    </script>
</body>
</html>
