<!DOCTYPE html>
<html>
<head>
    <title>Token Auth Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #00ff00; }
        .log { background: #0a0a0a; padding: 10px; margin: 5px 0; border-left: 3px solid #00ff00; }
        .error { border-left-color: #ff0000; color: #ff0000; }
        .success { border-left-color: #00ff00; }
        button { padding: 10px 20px; margin: 5px; background: #00ff00; color: #000; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔐 Token Authentication Debugger</h1>
    
    <div>
        <button onclick="testLogin()">1. Test Login</button>
        <button onclick="testCreateBook()">2. Create Book (with token)</button>
        <button onclick="testCreateBookNoToken()">3. Create Book (NO token)</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>

    <div id="logs"></div>

    <script>
        const logsDiv = document.getElementById('logs');
        let token = null;

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = msg;
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(msg);
        }

        function clearLogs() {
            logsDiv.innerHTML = '';
        }

        async function testLogin() {
            log('='.repeat(50), 'info');
            log('🔐 Testing LOGIN...', 'info');
            log('='.repeat(50), 'info');

            try {
                const payload = {
                    email: 'admin@tokobuku.com',
                    password: 'admin123'
                };

                log(`📤 Sending: ${JSON.stringify(payload)}`, 'info');

                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                log(`📥 Status: ${response.status}`, response.ok ? 'success' : 'error');

                const data = await response.json();
                log(`📦 Response: ${JSON.stringify(data, null, 2)}`, 'info');

                if (data.token) {
                    token = data.token;
                    log(`✅ Token obtained: ${token.substring(0, 50)}...`, 'success');
                    log(`Token saved to: window.token`, 'success');
                } else {
                    log(`❌ No token in response!`, 'error');
                }
            } catch (err) {
                log(`❌ Error: ${err.message}`, 'error');
            }
        }

        async function testCreateBook() {
            log('='.repeat(50), 'info');
            log('📚 Testing CREATE BOOK (with token)...', 'info');
            log('='.repeat(50), 'info');

            if (!token) {
                log('❌ No token! Run testLogin() first', 'error');
                return;
            }

            try {
                const payload = {
                    title: 'Debug Test Book ' + Date.now(),
                    author: 'Test Author',
                    price: 50000,
                    stock: 10,
                    rating: 4.5,
                    category: 'Test',
                    description: 'Testing token auth'
                };

                log(`📤 Auth Header: Bearer ${token.substring(0, 30)}...`, 'info');
                log(`📤 Payload: ${JSON.stringify(payload)}`, 'info');

                const response = await fetch('http://localhost:5000/api/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                log(`📥 Status: ${response.status}`, response.ok ? 'success' : 'error');

                const data = await response.json();
                log(`📦 Response: ${JSON.stringify(data, null, 2)}`, 'info');

                if (response.ok) {
                    log(`✅ Book created successfully!`, 'success');
                } else {
                    log(`❌ Failed: ${data.error || data.message}`, 'error');
                }
            } catch (err) {
                log(`❌ Error: ${err.message}`, 'error');
            }
        }

        async function testCreateBookNoToken() {
            log('='.repeat(50), 'info');
            log('📚 Testing CREATE BOOK (NO token - should fail)...', 'info');
            log('='.repeat(50), 'info');

            try {
                const payload = {
                    title: 'No Token Test ' + Date.now(),
                    author: 'Test Author',
                    price: 50000,
                    stock: 10,
                    rating: 4.5,
                    category: 'Test'
                };

                log(`📤 Payload (NO Authorization header): ${JSON.stringify(payload)}`, 'info');

                const response = await fetch('http://localhost:5000/api/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                        // NO Authorization header
                    },
                    body: JSON.stringify(payload)
                });

                log(`📥 Status: ${response.status}`, response.ok ? 'success' : 'error');

                const data = await response.json();
                log(`📦 Response: ${JSON.stringify(data, null, 2)}`, 'info');

                if (response.status === 401) {
                    log(`✅ Correctly rejected (missing token)`, 'success');
                }
            } catch (err) {
                log(`❌ Error: ${err.message}`, 'error');
            }
        }

        // Auto log
        log('🚀 Debugger ready!', 'success');
        log('Click buttons above to test', 'info');
    </script>
</body>
</html>
