<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; }
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .book-image {
            width: 100%;
            height: 250px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .book-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .book-info {
            padding: 15px;
        }
        .book-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .book-info p {
            font-size: 14px;
            color: #666;
            margin: 5px 0;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .loading { background: #e3f2fd; color: #1976d2; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Test Images - Minimal Version</h1>
        
        <div id="status" class="status">Loading...</div>
        <div id="books"></div>
    </div>

    <script>
        async function loadBooks() {
            const statusDiv = document.getElementById('status');
            const booksDiv = document.getElementById('books');
            
            try {
                statusDiv.textContent = '⏳ Fetching from /api/books...';
                statusDiv.className = 'status loading';
                
                const response = await fetch('/api/books');
                console.log('Response status:', response.status);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                const books = data.data || data;
                if (!Array.isArray(books)) throw new Error('Data is not array');
                
                statusDiv.textContent = `✓ Loaded ${books.length} books`;
                statusDiv.className = 'status success';
                
                if (books.length === 0) {
                    booksDiv.innerHTML = '<p>No books in database</p>';
                    return;
                }
                
                let html = '<div class="books-grid">';
                books.forEach(book => {
                    const imgUrl = `http://localhost:5000/images/${book.image}`;
                    html += `
                        <div class="book-card">
                            <div class="book-image">
                                <img src="${imgUrl}" 
                                     alt="${book.title}"
                                     onerror="console.error('Failed to load: ${book.image}'); this.parentElement.innerHTML='📖';">
                            </div>
                            <div class="book-info">
                                <h3>${book.title}</h3>
                                <p>by ${book.author}</p>
                                <p>Rp ${parseInt(book.price).toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                booksDiv.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.textContent = `❌ Error: ${error.message}`;
                statusDiv.className = 'status error';
            }
        }
        
        loadBooks();
    </script>
</body>
</html>
